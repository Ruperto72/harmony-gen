<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarmonyGen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HarmonyGen</h1>
            <p class="subtitle">Sjung i mikrofonen för att generera harmonistämmor i realtid</p>
        </header>

        <!-- Huvudkontroller -->
        <div class="controls">
            <button id="start-btn">Starta Mikrofon</button>
            <label for="file-input" class="btn-file">&#127925; Ladda upp fil</label>
            <input type="file" id="file-input" accept="audio/*" style="display:none">
            <button id="settings-toggle" class="secondary">&#9881; Inställningar</button>
        </div>

        <!-- Inställningspanel -->
        <div id="settings-popup" class="settings-box">
            <h3>Inställningar</h3>

            <div class="setting-row">
                <label for="harmony-type">Intervall:</label>
                <select id="harmony-type">
                    <option value="third">Ters (3:e)</option>
                    <option value="fifth">Kvint (5:e)</option>
                    <option value="sixth">Sext (6:e)</option>
                    <option value="octave">Oktav</option>
                </select>
            </div>

            <div class="setting-row">
                <label for="voice-count">Antal stämmor:</label>
                <select id="voice-count">
                    <option value="1">1 stämma</option>
                    <option value="2">2 stämmor</option>
                    <option value="3">3 stämmor</option>
                </select>
            </div>
        </div>

        <!-- Statusvisning -->
        <div id="status-panel" class="panel">
            <p class="status-line">Status: <span id="status">Väntar...</span></p>
            <div class="display">
                <h2 id="pitch-display">-- Hz</h2>
                <h3 id="note-display">Not: --</h3>
                <p id="scale-display">Tonart: --</p>
            </div>
        </div>

        <!-- Vågformsvisualisering -->
        <div class="canvas-container">
            <canvas id="waveform-canvas"></canvas>
        </div>

        <!-- Export/inspelning -->
        <div class="controls export-controls">
            <button id="export-btn" class="secondary">&#9210; Spela in</button>
            <a id="download-link" class="btn-download" style="display:none" download="harmony-export.webm">&#11015; Ladda ned inspelning</a>
        </div>
    </div>

    <script src="https://unpkg.com/tone"></script>
    <script src="https://unpkg.com/pitchy@4.0.0/dist/index-browser.js"></script>
    <script src="app.js"></script>
</body>
</html>
